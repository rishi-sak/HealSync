<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login - HealSync</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
    body { background: #f5f8ff; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .container { background: white; padding: 2rem 3rem; border-radius: 18px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); width: 350px; }
    .container h2 { text-align: center; margin-bottom: 1.5rem; }
    input[type="email"], input[type="password"] {
      width: 100%; padding: 10px; margin: 10px 0 20px; border: 1px solid #ccc;
      border-radius: 8px; outline: none; transition: 0.3s ease;
    }
    input:focus { border-color: #007bff; }
    .btn {
      width: 100%; background: #007bff; color: white; border: none;
      padding: 12px; border-radius: 24px; cursor: pointer;
      transition: background 0.3s ease;
    }
    .btn:hover { background: #0056d2; }
    .footer { margin-top: 15px; text-align: center; font-size: 14px; }
    .footer a { color: #007bff; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h2>Login</h2>
    <form action="http://localhost:8080/healsync/login" method="post">

      <label>Email address</label>
      <input type="email" name="email" required />

      <label>Password</label>
      <input type="password" name="password" required />

      <button class="btn" type="submit">Login</button>

      <div class="footer">
        Don't have an account? <a href="register.html">Register</a>
      </div>
    </form>
  </div>
</body>
</html>
